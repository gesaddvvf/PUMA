<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesso Moduli</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: transparent;
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 20px 10px;
  overflow: auto; /* FIX scroll */
}

.container {
  background: #111;
  padding: 22px;
  border-radius: 20px;
  width: 100%;
  max-width: 480px;
  border: 2px solid #ffd100;
  box-shadow: 0 8px 25px rgba(0,0,0,0.6);
}

.btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  margin: 10px 0;
  padding: 15px;
  border-radius: 40px;
  background: linear-gradient(135deg, #ffd100, #ffb800);
  color: #000;
  font-size: 16px;
  font-weight: bold;
  border: none;
  cursor: pointer;
}

.btn:hover {
  background: linear-gradient(135deg, #ffe45c, #ffc400);
}

.icon {
  font-size: 26px;
  min-width: 60px;
  text-align: center;
}

.secondary {
  background: #333;
  color: #ff3333;
}

.admin-btn {
  background: #fff;
  color: #000;
}

.hidden {
  display: none;
}

iframe {
  width: 100%;
  height: 600px;
  border: none;
  margin-top: 15px;
  border-radius: 10px;
}

footer {
  text-align: center;
  margin-top: 15px;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="container">

  <!-- MODULO 1 -->
  <button class="btn" onclick="apriModulo(1)">
    <span class="icon">1 📋</span>
    Profilazione individuale iniziale
  </button>
  <iframe id="frame1" class="hidden"></iframe>

  <!-- MODULO 2 -->
  <button class="btn" onclick="apriModulo(2)">
    <span class="icon">2 📝</span>
    Registrazione attività<br>Modifica utente<br>Stampa report individuale
  </button>
  <iframe id="frame2" class="hidden"></iframe>

  <!-- MODULO 3 -->
  <button class="btn" onclick="apriModulo(3)">
    <span class="icon">3 📅</span>
    Pianificazione addestramenti collettivi
  </button>
  <iframe id="frame3" class="hidden"></iframe>

  <!-- AREA RISERVATA -->
  <button class="btn secondary" onclick="mostraLogin()">
    <span class="icon">4 🔒</span>
    Area Riservata
  </button>

  <div id="loginBox" class="hidden">
    <input type="password" id="password" placeholder="Inserisci password">
    <button class="btn" onclick="login()">ACCEDI</button>
  </div>

  <div id="areaProtetta" class="hidden">
    <button class="btn admin-btn" onclick="apriAdmin()">
      <span class="icon">🏢</span>
      Gestione Comando
    </button>

    <button class="btn secondary" onclick="logout()">Logout</button>
  </div>

  <iframe id="frameAdmin" class="hidden"></iframe>

  <footer>P.U.M.A.</footer>
</div>

<script>
const PASSWORD_CORRETTA = "********";

/* CHIUDE TUTTI I FRAME */
function chiudiTutti(){
  document.querySelectorAll("iframe").forEach(f => {
    f.classList.add("hidden");
    f.src = "";
  });
}

/* APERTURA MODULI */
function apriModulo(n){
  chiudiTutti();

  const link = {
    1: "https://docs.google.com/forms/d/e/XXXXX/viewform?embedded=true",
    2: "https://docs.google.com/forms/d/e/XXXXX/viewform?embedded=true",
    3: "https://docs.google.com/forms/d/e/XXXXX/viewform?embedded=true"
  };

  const frame = document.getElementById("frame"+n);
  frame.src = link[n];
  frame.classList.remove("hidden");
}

/* ADMIN */
function apriAdmin(){
  chiudiTutti();
  const frame = document.getElementById("frameAdmin");
  frame.src = "https://docs.google.com/forms/d/e/XXXXX/viewform?embedded=true";
  frame.classList.remove("hidden");
}

/* LOGIN */
function mostraLogin(){
  document.getElementById("loginBox").classList.toggle("hidden");
}

function login(){
  const pass = document.getElementById("password").value;

  if(pass === PASSWORD_CORRETTA){
    document.getElementById("areaProtetta").classList.remove("hidden");
    document.getElementById("loginBox").classList.add("hidden");
  } else {
    alert("Password errata");
  }

  document.getElementById("password").value = "";
}

function logout(){
  document.getElementById("areaProtetta").classList.add("hidden");
}
</script>

</body>
</html>
