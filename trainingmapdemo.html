<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mappa Leaflet da Google Sheet - Tema Scuro</title>
  <!-- Google Fonts: Comfortaa -->
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    body, table {
      font-family: 'Comfortaa', cursive;
      background-color: #1e1e1e;
      color: #f0f0f0;
    }
    #map {
      height: 100vh;
      height: 100dvh; /* usa dynamic viewport height su mobile, evita salti con barra indirizzi */
      width: 100%;
    }

    .popup-field {
      padding: 8px 10px;
      border-bottom: 1px solid #444;
    }
    .popup-field:nth-child(even) { background-color: #2a2a2a; }
    .popup-field:nth-child(odd) { background-color: #1f1f1f; }
    .popup-field .key {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #aaaaaa;
      margin-bottom: 3px;
    }
    .popup-field .value {
      display: block;
      font-weight: bold;
      color: #ffd700;
      font-size: 14px;
      white-space: pre-line;
      overflow-wrap: normal;
      word-break: keep-all;
    }

    /* Popup Leaflet responsive */
    .leaflet-popup-content-wrapper {
      max-height: 70vh;
      max-height: 70dvh;
      min-width: 320px;
      max-width: min(1100px, 96vw);
      overflow-y: auto;
      background-color: #2a2a2a;
      color: #f0f0f0;
    }
    .leaflet-popup-content {
      margin: 10px 12px;
      width: auto !important; /* Leaflet forza una larghezza inline, la sblocchiamo */
    }
    .leaflet-popup-tip {
      background: #2a2a2a;
    }

    .popup-btn {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 8px;
      padding: 12px 0;
      font-size: 16px;
      background-color: #ffd700;
      color: #1e1e1e;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
      text-align: center;
    }
    .popup-btn:active {
      background-color: #e6c200;
    }

    a.tel-link {
      color: #00ffff;
      text-decoration: underline;
    }

    /* Controlli Leaflet più grandi e leggibili su touch */
    .leaflet-control-zoom a {
      width: 36px !important;
      height: 36px !important;
      line-height: 36px !important;
      font-size: 20px !important;
    }

    /* Schermi molto piccoli: popup più largo e testo leggermente più grande */
    @media (max-width: 480px) {
      .leaflet-popup-content-wrapper {
        max-width: 95vw;
      }
      table {
        font-size: 14px;
      }
      .popup-btn {
        font-size: 17px;
        padding: 14px 0;
      }
    }
  </style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
// CSV del foglio Real_Time_Map
const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRfRKFf6aHC3asr7iNREmon_px3MLiLhbU78DDi-MucJx8sds6yX1e303P23wjR0IitnaNhFRNzDkzd/pub?gid=744101024&single=true&output=csv";

const map = L.map('map', {
    tap: true,
    touchZoom: true,
    zoomControl: false // riposizioniamo lo zoom control per non coprire i marker in basso su mobile
}).setView([41.9, 12.5], 6);

L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

// Ricalcola le dimensioni della mappa se cambia l'orientamento o la barra indirizzi mobile appare/scompare
window.addEventListener('resize', () => map.invalidateSize());
window.addEventListener('orientationchange', () => setTimeout(() => map.invalidateSize(), 200));

function getIconUrl(tipo) {
  tipo = tipo?.toLowerCase() || "";
  return "https://cdn-icons-png.flaticon.com/512/684/684908.png";
}

Papa.parse(sheetUrl, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    const data = results.data;
    if(data.length === 0) return;

    const markers = L.featureGroup();
    const headers = Object.keys(data[0]);

    data.forEach(row => {
      const coordStr = row["Coordinate"];
      if(coordStr) {
        const [lat, lng] = coordStr.split(',').map(x => parseFloat(x.trim()));
        if(!isNaN(lat) && !isNaN(lng)) {

          const icon = L.icon({
            iconUrl: getIconUrl(row["Tipologia addestramento"]),
            iconSize: [32,32],
            iconAnchor: [16,32],
            popupAnchor: [0,-32]
          });

          const marker = L.marker([lat,lng], {icon: icon}).addTo(map);

          // Pulsante in alto
          let popupContent = `<button class="popup-btn" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}','_blank')">🚒 Naviga a</button>`;

          // Blocchi popup (etichetta sopra, valore sotto, su tutta la larghezza)
          popupContent += `<div class="popup-fields">`;
          headers.forEach(key => {
            if(row[key] !== undefined) {
              let val = row[key];

              // Se la colonna contiene numeri tra parentesi, crea link "chiama" con +39
              // esempio: "Comando (12345)" diventa <a href="tel:+3912345">
              val = val.replace(/\((\d+)\)/g, (match, num) => {
                return `(<a class="tel-link" href="tel:+39${num}">${num}</a>)`;
              });

              // Se il valore è su più righe (es. elenco nominativi), aggiunge una freccia davanti a ogni riga
              if (val.includes('\n')) {
                val = val
                  .split('\n')
                  .map(line => line.trim() ? `▸ ${line.trim()}` : line)
                  .join('\n');
              }

              popupContent += `<div class="popup-field"><span class="key">${key}</span><span class="value">${val}</span></div>`;
            }
          });
          popupContent += `</div>`;

          marker.bindPopup(popupContent, {
            maxWidth: window.innerWidth < 480 ? window.innerWidth * 0.96 : 1100,
            autoPanPadding: [20, 20]
          });

          marker.on('mouseover', function() { this.setZIndexOffset(1000); });
          marker.on('mouseout', function() { this.setZIndexOffset(0); });

          markers.addLayer(marker);
        }
      }
    });

    if(markers.getLayers().length>0){
      map.fitBounds(markers.getBounds().pad(0.2));
    }
  }
});
</script>
</body>
</html>
